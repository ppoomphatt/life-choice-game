<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Youth Decision Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

#game{
max-width:900px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

button{
display:block;
width:100%;
margin:10px 0;
padding:15px;
font-size:16px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.stats{
margin-top:20px;
font-size:18px;
}

#leaderboard{
margin-top:40px;
}

</style>

</head>

<body>

<div id="game">

<h1>Youth Decision Lab</h1>

<p id="story"></p>

<div id="choices"></div>

<div class="stats">

❤️ Health <span id="health">100</span> |
🧠 Decision <span id="decision">100</span> |
👥 Social <span id="social">100</span> |
🛡 Responsibility <span id="responsibility">100</span> |
⚠ Risk <span id="risk">0</span>

</div>

</div>

<div id="report" style="display:none; margin-top:40px;">

<h2>รายงานการตัดสินใจของคุณ</h2>

<canvas id="resultChart" width="400" height="200"></canvas>

<h3 id="ending"></h3>

</div>

<div id="leaderboard">

<h2>School Leaderboard</h2>

<table style="margin:auto;">

<tr>
<th>โรงเรียน</th>
<th>คะแนน</th>
</tr>

<tr>
<td>โรงเรียน A</td>
<td>87</td>
</tr>

<tr>
<td>โรงเรียน B</td>
<td>82</td>
</tr>

<tr>
<td>โรงเรียน C</td>
<td>79</td>
</tr>

</table>

</div>

<script>

let health=100
let decision=100
let social=100
let responsibility=100
let risk=0

let step=0

const scenes=[

{
story:"เพื่อนชวนคุณไปงานปาร์ตี้ก่อนสอบ",
choices:[
{text:"ไปแต่ไม่ดื่ม",effect:()=>{social+=5}},
{text:"ดื่มเล็กน้อย",effect:()=>{risk+=10;health-=5}},
{text:"ไม่ไป",effect:()=>{decision+=5}}
]
},

{
story:"เพื่อนเมาและจะขับรถกลับ",
choices:[
{text:"ปล่อยเขาไป",effect:()=>{risk+=40}},
{text:"เรียกแท็กซี่",effect:()=>{responsibility+=10}},
{text:"เอากุญแจรถเขา",effect:()=>{social-=5;risk-=10}}
]
},

{
story:"เพื่อนถ่ายคลิปในงานปาร์ตี้เพื่อโพสต์",
choices:[
{text:"ร่วมถ่าย",effect:()=>{risk+=10}},
{text:"เตือนเพื่อน",effect:()=>{decision+=5}},
{text:"ออกจากสถานการณ์",effect:()=>{health+=5}}
]
},

{
story:"เพื่อนสนิทเริ่มดื่มหนักเพราะเครียด",
choices:[
{text:"ปล่อยเขา",effect:()=>{risk+=10}},
{text:"ชวนทำกิจกรรมอื่น",effect:()=>{responsibility+=10}},
{text:"คุยจริงจังกับเขา",effect:()=>{decision+=10}}
]
},

{
story:"เพื่อนกดดันว่าถ้าไม่ดื่มแปลว่าไม่ใช่เพื่อน",
choices:[
{text:"ดื่มเพื่อรักษามิตรภาพ",effect:()=>{risk+=20}},
{text:"ปฏิเสธอย่างสุภาพ",effect:()=>{decision+=10}},
{text:"เปลี่ยนหัวข้อคุย",effect:()=>{social+=5}}
]
}

]

function updateStats(){

document.getElementById("health").innerText=health
document.getElementById("decision").innerText=decision
document.getElementById("social").innerText=social
document.getElementById("responsibility").innerText=responsibility
document.getElementById("risk").innerText=risk

}

function showScene(){

if(step>=scenes.length){

finishGame()

return
}

let s=scenes[step]

document.getElementById("story").innerText=s.story

let cDiv=document.getElementById("choices")

cDiv.innerHTML=""

s.choices.forEach(c=>{

let btn=document.createElement("button")

btn.innerText=c.text

btn.onclick=()=>{

c.effect()

updateStats()

step++

showScene()

}

cDiv.appendChild(btn)

})

}

function finishGame(){

document.getElementById("game").style.display="none"

document.getElementById("report").style.display="block"

let ending=""

if(risk<20) ending="Healthy Decision Maker"
else if(risk<40) ending="Balanced Social Life"
else if(risk<60) ending="Peer Follower"
else ending="Risk Taker"

document.getElementById("ending").innerText="ผลลัพธ์: "+ending

let ctx=document.getElementById("resultChart")

new Chart(ctx,{

type:"radar",

data:{
labels:["Health","Decision","Social","Responsibility","Risk"],
datasets:[{
label:"Your Profile",
data:[health,decision,social,responsibility,100-risk]
}]
}

})

}

showScene()

</script>

</body>
</html>
