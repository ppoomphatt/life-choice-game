<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Youth Decision Lab</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#020617;
padding:20px;
font-size:24px;
}

.page{
display:none;
padding:40px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

#gamebox{
max-width:800px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:12px;
}

.stats{
margin-top:20px;
font-size:18px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:10px;
}

</style>

</head>

<body>

<header>
Youth Decision Lab
</header>

<div id="home" class="page" style="display:block">

<h1>แพลตฟอร์มเกมจำลองการตัดสินใจของเยาวชน</h1>

<button onclick="showPage('avatar')">เริ่มเกม</button>
<button onclick="showPage('leaderboard')">ตารางคะแนนโรงเรียน</button>

</div>

<div id="avatar" class="page">

<h2>เลือกตัวละคร</h2>

<button onclick="selectAvatar('นักสำรวจ')">นักสำรวจ</button>
<button onclick="selectAvatar('นักคิด')">นักคิด</button>
<button onclick="selectAvatar('ผู้นำ')">ผู้นำ</button>

</div>

<div id="game" class="page">

<div id="gamebox">

<h2 id="story"></h2>

<div id="choices"></div>

<div class="stats">

❤️ Health <span id="health">100</span> |
🧠 Decision <span id="decision">100</span> |
👥 Social <span id="social">100</span> |
🛡 Responsibility <span id="responsibility">100</span> |
⚠ Risk <span id="risk">0</span>

</div>

</div>

</div>

<div id="result" class="page">

<h2>ผลการวิเคราะห์ผู้เล่น</h2>

<canvas id="chart" width="400" height="200"></canvas>

<h3 id="ending"></h3>

<button onclick="location.reload()">เล่นอีกครั้ง</button>

</div>

<div id="leaderboard" class="page">

<h2>School Leaderboard</h2>

<table>

<tr>
<th>โรงเรียน</th>
<th>คะแนนเฉลี่ย</th>
</tr>

<tr>
<td>โรงเรียน A</td>
<td>90</td>
</tr>

<tr>
<td>โรงเรียน B</td>
<td>84</td>
</tr>

<tr>
<td>โรงเรียน C</td>
<td>80</td>
</tr>

</table>

<br>

<button onclick="showPage('home')">กลับหน้าแรก</button>

</div>

<script>

function showPage(p){

document.querySelectorAll(".page").forEach(e=>e.style.display="none")

document.getElementById(p).style.display="block"

}

let avatar=""

function selectAvatar(a){

avatar=a

showPage("game")

startGame()

}

let health=100
let decision=100
let social=100
let responsibility=100
let risk=0

let step=0

const scenes=[

{
story:"เพื่อนชวนคุณไปงานปาร์ตี้ก่อนสอบ",
choices:[
{text:"ไปแต่ไม่ดื่ม",effect:()=>{social+=5}},
{text:"ดื่มเล็กน้อย",effect:()=>{risk+=10;health-=5}},
{text:"ไม่ไป",effect:()=>{decision+=5}}
]
},

{
story:"เพื่อนเมาและจะขับรถกลับ",
choices:[
{text:"ปล่อยเขาไป",effect:()=>{risk+=40}},
{text:"เรียกแท็กซี่",effect:()=>{responsibility+=10}},
{text:"เอากุญแจรถเขา",effect:()=>{social-=5;risk-=10}}
]
},

{
story:"มีคนไลฟ์สดในงานปาร์ตี้",
choices:[
{text:"ร่วมไลฟ์",effect:()=>{risk+=10}},
{text:"เตือนเพื่อน",effect:()=>{decision+=5}},
{text:"ออกจากสถานการณ์",effect:()=>{health+=5}}
]
},

{
story:"เพื่อนสนิทเริ่มดื่มหนักเพราะเครียด",
choices:[
{text:"ปล่อยเขา",effect:()=>{risk+=10}},
{text:"ชวนทำกิจกรรมอื่น",effect:()=>{responsibility+=10}},
{text:"คุยจริงจังกับเขา",effect:()=>{decision+=10}}
]
},

{
story:"เพื่อนกดดันว่าถ้าไม่ดื่มแปลว่าไม่ใช่เพื่อน",
choices:[
{text:"ดื่มเพื่อรักษามิตรภาพ",effect:()=>{risk+=20}},
{text:"ปฏิเสธอย่างสุภาพ",effect:()=>{decision+=10}},
{text:"เปลี่ยนหัวข้อคุย",effect:()=>{social+=5}}
]
}

]

function updateStats(){

document.getElementById("health").innerText=health
document.getElementById("decision").innerText=decision
document.getElementById("social").innerText=social
document.getElementById("responsibility").innerText=responsibility
document.getElementById("risk").innerText=risk

}

function startGame(){

showScene()

}

function showScene(){

if(step>=scenes.length){

finish()

return

}

let s=scenes[step]

document.getElementById("story").innerText=s.story

let cDiv=document.getElementById("choices")

cDiv.innerHTML=""

s.choices.forEach(c=>{

let btn=document.createElement("button")

btn.innerText=c.text

btn.onclick=()=>{

c.effect()

updateStats()

step++

showScene()

}

cDiv.appendChild(btn)

})

}

function finish(){

showPage("result")

let ending=""

if(risk<20) ending="Healthy Decision Maker"
else if(risk<40) ending="Balanced Social Life"
else if(risk<60) ending="Peer Follower"
else ending="Risk Taker"

document.getElementById("ending").innerText="ผลลัพธ์ของ "+avatar+" : "+ending

let ctx=document.getElementById("chart")

new Chart(ctx,{

type:"radar",

data:{
labels:["Health","Decision","Social","Responsibility","Risk"],
datasets:[{
label:"Profile",
data:[health,decision,social,responsibility,100-risk]
}]
}

})

}

</script>

</body>
</html>
